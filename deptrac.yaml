deptrac:
  paths:
    - ./src/php
  layers:
    - name: PluginBootstrap
      collectors:
        - type: class
          value: Fundrik\\WordPress\\Application    

    - name: ContainerBindings
      collectors:
        - type: class
          value: Fundrik\\WordPress\\Infrastructure\\Container\\ServiceBindings

    - name: EventBindings
      collectors:
        - type: class
          value: Fundrik\\WordPress\\Infrastructure\\EventDispatcher\\EventListenerRegistrar

    - name: Laravel
      collectors:
        - type: classLike
          value: Illuminate\\.*

    - name: PsrLogger
      collectors:
        - type: classLike
          value: Psr\\Log\\.*

    - name: WordPressExternal
      collectors:
        - type: classLike
          value: ^wpdb$
        - type: classLike
          value: ^WP_.+$

    - name: Support
      collectors:
        - type: classLike
          value: Fundrik\\(Core|WordPress)\\Support\\.*

    - name: CoreDomain
      collectors:
        - type: classLike
          value: Fundrik\\Core\\.*\\Domain\\.*

    - name: CoreApplication
      collectors:
        - type: classLike
          value: Fundrik\\Core\\.*\\Application\\.*

    - name: Domain
      collectors:
        - type: classLike
          value: Fundrik\\WordPress\\.*\\Domain\\.*

    - name: Application
      collectors:
        - type: classLike
          value: Fundrik\\WordPress\\.*\\Application\\.*

    - name: Infrastructure
      collectors:
      - type: bool
        must:
          - type: classLike
            value: Fundrik\\WordPress\\Infrastructure\\(?!Integration\\).*
        must_not:
          - type: class
            value: .*(ServiceBindings|EventListenerRegistrar).*

    - name: WordPressIntegration
      collectors:
        - type: classLike
          value: Fundrik\\WordPress\\Infrastructure\\Integration\\.*

  ruleset:
    PluginBootstrap:
      - ContainerBindings
      - Laravel
      - Infrastructure
      - WordPressIntegration

    ContainerBindings:
      - PluginBootstrap
      - EventBindings
      - Laravel
      - CoreDomain
      - CoreApplication
      - Domain
      - Application
      - Infrastructure
      - WordPressIntegration

    EventBindings:
      - Infrastructure
      - WordPressIntegration

    CoreDomain:
      - Support

    CoreApplication:
      - Support
      - CoreDomain

    Domain:
      - Support
      - CoreDomain

    Application:
      - Support
      - Domain
      - CoreApplication
      - CoreDomain
      - PsrLogger

    Infrastructure:
      - Laravel
      - PsrLogger
      - Support
      - Application

    WordPressIntegration:
      - PsrLogger
      - PluginBootstrap
      - WordPressExternal
      - Support
      - Application
      - Infrastructure
