deptrac:
  paths:
    - ./src/php

  layers:

    # Bootstrap root
    - name: Bootstrap
      collectors:
        - type: classLike
          value: ^Fundrik\\WordPress\\Bootstrap\\(?!Container\\).+

    # Container adapter only
    - name: BootstrapContainer
      collectors:
        - type: bool
          must:
            - type: classLike
              value: ^Fundrik\\WordPress\\Bootstrap\\Container\\.+$
          must_not:
            - type: classLike
              value: ^Fundrik\\WordPress\\Bootstrap\\Container\\ContainerBindings(Registrar|Registry)$

    # Container bindings
    - name: ContainerBindings
      collectors:
        - type: classLike
          value: ^Fundrik\\WordPress\\Bootstrap\\Container\\ContainerBindings(Registrar|Registry)$

    # Kernel
    - name: Kernel
      collectors:
        - type: classLike
          value: ^Fundrik\\WordPress\\Kernel\\(?!Ports\\).+

    - name: KernelPorts
      collectors:
        - type: classLike
          value: ^Fundrik\\WordPress\\Kernel\\Ports\\.+

    # External libs / platform
    - name: Toolbox
      collectors:
        - type: classLike
          value: ^Fundrik\\Toolbox\\.+

    - name: Laravel
      collectors:
        - type: classLike
          value: ^Illuminate\\.*

    - name: PsrLogger
      collectors:
        - type: classLike
          value: ^Psr\\Log\\.*

    - name: WordPressExternal
      collectors:
        - type: classLike
          value: ^wpdb$
        - type: classLike
          value: ^WP_.+$

    # Infrastructure
    - name: Infrastructure
      collectors:
        - type: bool
          must:
            - type: classLike
              value: ^Fundrik\\WordPress\\Infrastructure\\(?!Integration\\).+
          must_not:
            - type: classLike
              value: ^Fundrik\\WordPress\\Infrastructure\\EventDispatcher\\EventListener(Registrar|Registry)$

    - name: EventBindings
      collectors:
        - type: classLike
          value: ^Fundrik\\WordPress\\Infrastructure\\EventDispatcher\\EventListener(Registrar|Registry)$

    - name: WordPressIntegration
      collectors:
        - type: classLike
          value: ^Fundrik\\WordPress\\Infrastructure\\Integration\\.+

    # Core / Components
    - name: CoreDomain
      collectors:
        - type: classLike
          value: ^Fundrik\\Core\\Components\\[^\\]+\\Domain\\.+

    - name: CoreApplication
      collectors:
        - type: classLike
          value: ^Fundrik\\Core\\Components\\[^\\]+\\Application\\(?!Ports\\).+

    - name: CoreApplicationPorts
      collectors:
        - type: classLike
          value: ^Fundrik\\Core\\Components\\[^\\]+\\Application\\Ports\\.+

    - name: Domain
      collectors:
        - type: classLike
          value: ^Fundrik\\WordPress\\Components\\[^\\]+\\Domain\\.+

    - name: Application
      collectors:
        - type: classLike
          value: ^Fundrik\\WordPress\\Components\\[^\\]+\\Application\\(?!Ports\\).+

    - name: ApplicationPorts
      collectors:
        - type: classLike
          value: ^Fundrik\\WordPress\\Components\\[^\\]+\\Application\\Ports\\.+

  ruleset:

    Bootstrap:
      - BootstrapContainer
      - Laravel
      - Kernel
      - KernelPorts

    BootstrapContainer:
      - Laravel

    ContainerBindings:
      - EventBindings
      - BootstrapContainer
      - Laravel
      - Kernel
      - KernelPorts
      - Application
      - ApplicationPorts
      - CoreApplicationPorts
      - Infrastructure
      - WordPressIntegration

    Infrastructure:
      - Laravel
      - BootstrapContainer
      - PsrLogger
      - Toolbox
      - KernelPorts
      - CoreDomain
      - Domain
      - CoreApplicationPorts
      - ApplicationPorts

    Kernel:
      - KernelPorts

    EventBindings:
      - KernelPorts
      - Infrastructure
      - WordPressIntegration

    Domain:
      - CoreDomain

    Application:
      - CoreDomain
      - Domain
      - CoreApplication
      - CoreApplicationPorts
      - ApplicationPorts

    ApplicationPorts:
      - CoreDomain
      - Domain
      - CoreApplicationPorts

    WordPressIntegration:
      - BootstrapContainer
      - PsrLogger
      - Toolbox
      - KernelPorts
      - WordPressExternal
      - Infrastructure
