deptrac:
  paths:
    - ./src/php

  layers:

    # Container
    - name: Container
      collectors:
        - type: bool
          must:
            - type: classLike
              value: ^Fundrik\\WordPress\\Kernel\\Container\\.+$
          must_not:
            - type: classLike
              value: ^Fundrik\\WordPress\\Kernel\\Container\\ContainerBindings(Registrar|Registry)$

    - name: ContainerBindings
      collectors:
        - type: classLike
          value: ^Fundrik\\WordPress\\Kernel\\Container\\ContainerBindings(Registrar|Registry)$

    # Kernel
    - name: Kernel
      collectors:
        - type: classLike
          value: ^Fundrik\\WordPress\\Kernel\\(?!Ports|Container\\).+

    - name: KernelPorts
      collectors:
        - type: classLike
          value: ^Fundrik\\WordPress\\Kernel\\Ports\\.+

    # External libs / platform
    - name: Toolbox
      collectors:
        - type: classLike
          value: ^Fundrik\\Toolbox\\.+

    - name: Laravel
      collectors:
        - type: classLike
          value: ^Illuminate\\.*

    - name: PsrLogger
      collectors:
        - type: classLike
          value: ^Psr\\Log\\.*

    - name: WordPressExternal
      collectors:
        - type: classLike
          value: ^wpdb$
        - type: classLike
          value: ^WP_.+$

    # Infrastructure
    - name: Infrastructure
      collectors:
        - type: classLike
          value: ^Fundrik\\WordPress\\Infrastructure\\.+

    # Integration
    - name: WordPressIntegration
      collectors:
        - type: bool
          must:
            - type: classLike
              value: ^Fundrik\\WordPress\\Integration\\.+$
          must_not:
            - type: classLike
              value: ^Fundrik\\WordPress\\Integration\\.+Resolver$

    - name: WordPressIntegrationResolvers
      collectors:
        - type: classLike
          value: ^Fundrik\\WordPress\\Integration\\.+Resolver$

    # Core / Components
    - name: CoreDomain
      collectors:
        - type: classLike
          value: ^Fundrik\\Core\\Components\\[^\\]+\\Domain\\.+

    - name: CoreApplication
      collectors:
        - type: classLike
          value: ^Fundrik\\Core\\Components\\[^\\]+\\Application\\(?!Ports\\).+

    - name: CoreApplicationPorts
      collectors:
        - type: classLike
          value: ^Fundrik\\Core\\Components\\[^\\]+\\Application\\Ports\\.+

    - name: Domain
      collectors:
        - type: classLike
          value: ^Fundrik\\WordPress\\Components\\[^\\]+\\Domain\\.+

    - name: Application
      collectors:
        - type: classLike
          value: ^Fundrik\\WordPress\\Components\\[^\\]+\\Application\\(?!Ports\\).+

    - name: ApplicationPorts
      collectors:
        - type: classLike
          value: ^Fundrik\\WordPress\\Components\\[^\\]+\\Application\\Ports\\.+

  ruleset:

    Container:
      - Laravel

    ContainerBindings:
      - Container
      - WordPressIntegration
      - PsrLogger
      - KernelPorts
      - Infrastructure
      - WordPressIntegration
      - CoreApplicationPorts
      - WordPressIntegrationBoot

    Kernel:
      - KernelPorts

    Domain:

    Application:

    ApplicationPorts:

    Infrastructure:
      - KernelPorts
      - CoreApplicationPorts
      - CoreDomain
      - Toolbox
      - PsrLogger

    WordPressIntegration:
      - WordPressIntegrationResolvers
      - WordPressExternal
      - CoreDomain
      - Toolbox
      - PsrLogger
      - Infrastructure
      - CoreApplicationPorts
      - KernelPorts

    WordPressIntegrationResolvers:
      - WordPressIntegration
      - Container
